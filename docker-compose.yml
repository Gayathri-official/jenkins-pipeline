services:    
  # ===========================================================
  # SERVER SERVICE — Spring Boot REST API
  # ===========================================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sb-server
    ports:
      - "8080:8080"
    networks:
      - app-network
 
  # ===========================================================
  # CLIENT SERVICE — React frontend (served by Nginx)
  # ===========================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: react-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - app-network
 
networks:
  app-network:
    driver: bridge
